services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
      - ./uploads:/app/uploads
      - ./output:/app/output
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=sqlite:///./data/raphael.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
